<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="Текстовий редактор з деревовидною структурою сторінок">
<link rel="manifest" href="manifest.json">
<title>Arkhiv</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ══ GLOBAL TOPBAR ══ -->
  <header id="global-topbar">
    <div class="topbar-left">
      <button id="btn-toggle-sidebar" class="icon-btn" title="Показати / сховати дерево">&#9776;</button>
      <button id="btn-expand-labels" class="icon-btn" title="Розгорнути / згорнути назви в дереві">&#8801;</button>
      <button id="btn-new-page" class="icon-btn" title="Нова сторінка (Ctrl+N)">+</button>
      <span class="logo">Arkhiv</span>
    </div>
    <div class="topbar-center" id="global-breadcrumb"></div>
    <div class="topbar-right">
      <select id="format-select" title="Формат">
        <option value="auto">Авто</option>
        <option value="plain">Текст</option>
        <option value="markdown">Markdown</option>
        <option value="rich">Форматований</option>
      </select>
      <button id="btn-preview"     class="action-btn">&#9654; Перегляд</button>
      <button id="btn-import"      class="action-btn">&#8681; Імпорт</button>
      <button id="btn-export-pdf"  class="action-btn">PDF</button>
      <button id="btn-save"        class="action-btn primary">Зберегти</button>
      <button id="btn-delete-page" class="action-btn danger">&#10005;</button>
    </div>
  </header>

  <!-- ══ BODY ROW ══ -->
  <div id="body-row">

    <!-- Sidebar with resizable handle -->
    <aside id="sidebar">
      <div class="search-wrap">
        <input id="search-input" type="text" placeholder="Пошук..." autocomplete="off">
      </div>
      <div id="tree-root" class="tree"></div>
      <!-- drag handle -->
      <div id="sidebar-resizer"></div>
    </aside>

    <main id="editor-area">
      <div id="empty-state">
        <div class="empty-icon">&#9112;</div>
        <p>Оберіть або створіть сторінку</p>
        <button id="btn-create-first">Створити першу сторінку</button>
      </div>

      <div id="editor-wrap" class="hidden">
        <div id="breadcrumb-bar"></div>
        <div id="editor-titlebar">
          <input id="page-title" type="text" placeholder="Назва сторінки..." spellcheck="true">
        </div>

        <div id="format-bar" class="hidden">
          <button data-cmd="bold"><b>B</b></button>
          <button data-cmd="italic"><i>I</i></button>
          <button data-cmd="underline"><u>U</u></button>
          <button data-cmd="strikeThrough"><s>S</s></button>
          <span class="sep">|</span>
          <button data-cmd="insertUnorderedList">&#8226; Список</button>
          <button data-cmd="insertOrderedList">1. Список</button>
          <span class="sep">|</span>
          <button data-heading="h2">H2</button>
          <button data-heading="h3">H3</button>
          <button data-heading="p">&#182;</button>
          <span class="sep">|</span>
          <button data-cmd="createLink">&#128279;</button>
          <button data-cmd="removeFormat">&#10006;</button>
        </div>

        <div id="editor-container">
          <textarea id="editor-plain" placeholder="Починайте вводити текст..."></textarea>
          <div id="editor-rich" contenteditable="true" spellcheck="true" placeholder="Починайте вводити текст..."></div>
          <div id="editor-preview" class="hidden"></div>
        </div>

        <div id="editor-statusbar">
          <span id="status-format">Формат: Авто</span>
          <span id="status-words">0 слів</span>
          <span id="status-sync"></span>
          <span id="status-saved">&#9679; збережено</span>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Context menu -->
<div id="ctx-menu" class="ctx-menu hidden">
  <button data-action="rename">Перейменувати</button>
  <button data-action="add-child">Додати підсторінку</button>
  <button data-action="duplicate">Дублювати</button>
  <hr>
  <button data-action="delete" class="danger">Видалити</button>
</div>

<!-- Modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <p id="modal-text"></p>
    <div class="modal-actions">
      <button id="modal-confirm" class="primary">OK</button>
      <button id="modal-cancel">Скасувати</button>
    </div>
  </div>
</div>

<!-- Firebase config modal -->
<div id="fb-modal" class="hidden">
  <div id="fb-modal-box">
    <h2>Підключення Firebase</h2>
    <p>Вставте конфіг вашого Firebase проєкту (JSON з консолі Firebase):</p>
    <textarea id="fb-config-input" spellcheck="false" placeholder='{"apiKey":"...","authDomain":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'></textarea>
    <div class="modal-actions">
      <button id="fb-save-btn" class="primary">Підключити</button>
      <button id="fb-cancel-btn">Скасувати</button>
      <button id="fb-clear-btn" class="danger">Відключити</button>
    </div>
    <p id="fb-status"></p>
  </div>
</div>

<input type="file" id="file-input" accept=".txt,.md,.html" style="display:none">

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  window._fb = { initializeApp, getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc, writeBatch };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="app.js" defer></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
