<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Arkhiv">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Arkhiv</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- AUTH OVERLAY — shows by default, hidden after login -->
<div id="auth-overlay">
  <div id="auth-box">
    <div class="auth-logo">Arkhiv</div>
    <p class="auth-sub">Текстовий редактор</p>
    <div id="auth-spinner-wrap">
      <div class="auth-spinner"></div>
      <p>Перевірка сесії…</p>
    </div>
    <div id="auth-forms" class="hidden">
      <div id="auth-error" class="auth-error hidden"></div>
      <button id="btn-google" class="auth-btn google">
        <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Увійти через Google
      </button>
      <p class="auth-hint">Доступ тільки для авторизованого акаунту</p>
    </div>
  </div>
</div>

<!-- MAIN APP — hidden until logged in -->
<div id="app" class="hidden">

  <header id="global-topbar">
    <div class="topbar-left">
      <button id="btn-toggle-sidebar" class="icon-btn" title="Показати / сховати дерево"><span id="sidebar-arrow">&#8592;</span></button>
      <button id="btn-expand-labels"  class="icon-btn" title="Розгорнути назви в дереві">&#8801;</button>
      <button id="btn-new-page"       class="icon-btn" title="Нова сторінка (Ctrl+N)">+</button>
      <button id="btn-delete-page"    class="icon-btn danger-icon" title="Видалити сторінку">&#10005;</button>
      <span class="logo">Arkhiv</span>
      <span id="user-email-badge"></span>
    </div>
    <div class="topbar-right">
      <select id="format-select" title="Формат">
        <option value="auto">Авто</option>
        <option value="plain">Текст</option>
        <option value="markdown">Markdown</option>
        <option value="rich">Форматований</option>
      </select>
      <button id="btn-preview"    class="action-btn" title="Перегляд"><span class="btn-icon">&#9654;</span><span class="btn-label">&nbsp;Перегляд</span></button>
      <button id="btn-import"     class="action-btn" title="Імпорт файлу"><span class="btn-icon">&#8681;</span><span class="btn-label">&nbsp;Імпорт</span></button>
      <button id="btn-export-pdf" class="action-btn" title="Експорт PDF"><span class="btn-label">PDF</span></button>
      <button id="btn-save"       class="action-btn primary" title="Зберегти і синхронізувати (Ctrl+S)"><span class="btn-icon">&#128190;</span><span class="btn-label">&nbsp;Зберегти</span></button>
      <button id="btn-logout"     class="action-btn" title="Вийти">&#8594;&nbsp;Вийти</button>
    </div>
  </header>

  <div id="body-row">
    <aside id="sidebar">
      <div class="search-wrap">
        <input id="search-input" type="text" placeholder="Пошук..." autocomplete="off">
      </div>
      <div id="tree-root" class="tree"></div>
      <div id="sidebar-resizer"></div>
    </aside>

    <main id="editor-area">
      <div id="empty-state">
        <div class="empty-icon">&#9112;</div>
        <p>Оберіть або створіть сторінку</p>
        <button id="btn-create-first">Створити першу сторінку</button>
      </div>

      <div id="editor-wrap" class="hidden">
        <div id="editor-titlebar">
          <input id="page-title" type="text" placeholder="Назва сторінки..." spellcheck="true">
        </div>
        <div id="format-bar" class="hidden">
          <button data-cmd="bold"><b>B</b></button>
          <button data-cmd="italic"><i>I</i></button>
          <button data-cmd="underline"><u>U</u></button>
          <button data-cmd="strikeThrough"><s>S</s></button>
          <span class="sep">|</span>
          <button data-cmd="insertUnorderedList">&#8226; Список</button>
          <button data-cmd="insertOrderedList">1. Список</button>
          <span class="sep">|</span>
          <button data-heading="h2">H2</button>
          <button data-heading="h3">H3</button>
          <button data-heading="p">&#182;</button>
          <span class="sep">|</span>
          <button data-cmd="createLink">&#128279;</button>
          <button data-cmd="removeFormat">&#10006;</button>
        </div>
        <div id="editor-container">
          <textarea id="editor-plain" placeholder="Починайте вводити текст..."></textarea>
          <div id="editor-rich" contenteditable="true" spellcheck="true" placeholder="Починайте вводити текст..."></div>
          <div id="editor-preview" class="hidden"></div>
        </div>
        <div id="editor-statusbar">
          <span id="status-format">Формат: Авто</span>
          <span id="status-words">0 слів</span>
          <span id="breadcrumb-bar"></span>
          <span id="status-sync" class="sync-badge"></span>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="ctx-menu" class="ctx-menu hidden">
  <button data-action="rename">Перейменувати</button>
  <button data-action="add-child">Додати підсторінку</button>
  <button data-action="duplicate">Дублювати</button>
  <hr>
  <button data-action="delete" class="danger">Видалити</button>
</div>

<div id="modal-overlay" class="hidden">
  <div id="modal">
    <p id="modal-text"></p>
    <div class="modal-actions">
      <button id="modal-confirm" class="primary">OK</button>
      <button id="modal-cancel">Скасувати</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".txt,.md,.html" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="app.js" defer></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
  if (new URLSearchParams(location.search).get('new') === '1') {
    window.addEventListener('load', () => {
      history.replaceState({}, '', location.pathname);
      setTimeout(() => document.getElementById('btn-new-page')?.click(), 1200);
    });
  }
}
</script>
</body>
</html>
